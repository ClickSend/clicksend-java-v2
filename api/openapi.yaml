        \ files, you'll need to convert the file first using our uploads endpoint\
        \ with the querystring parameter ?convert=postcard. e.g. POST /uploads?convert=postcard.\
        \ This will return a URL to the converted pdf file that can be used in the\
        \ /post/postcards/send endpoint.\n\n### **Postcard Specification Guide**\n\
        \nFollow our [Postcard specification guide](https://help.clicksend.com/article/ysyql7bsr1-postcard-template)\
