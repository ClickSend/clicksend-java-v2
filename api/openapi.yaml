components:
  schemas:
    senders:
      description: |
        The `senders` property specifies sender IDs for each recipient country.
        - **Want to leverage the default sender settings:**
          - If the `senders` property is missing or left empty, the system uses the default sender settings configured for each recipient country.

        - **Want to override the default sender settings:**
          - When the `senders` property is provided, it should contain valid sender IDs for each recipient country listed under recipients. These IDs will override the default sender settings for the specified countries.
          - If an invalid sender ID is provided, or a sender ID for a specific recipient country is missing, the system will revert to using the default sender settings for that country.
      items:
        $ref: "#/components/schemas/senders_inner"
      type: array
    shorten_urls:
      description: |
        This controls whether URLs are automatically shortened. This affects all messages in the request. You can either specify:

        - **True** - Automatically detects and shortens one URL on each message.
        - **False** - Leaves all URLs in their original form. This is the default value.

        You will be able to retrieve the open rates and statistics for the link from this <a href="/messaging/url-shortening/other/short-url-get-statistics">link</a>.

        More info about shortening URLs <a href="/messaging/url-shortening/"> here</a>.
      type: boolean
    sms_send_sms:
      properties:
        direction:
          description: "It can either be **in** or **out**:\n\n- **in** - You received\
            \ a message. it has to do with inbound messages.\n    \n- **out** \\-\
            \ You are sending a message. It has to do with outbound messages."
          example: in
          type: string
        date:
          description: The date you sent the message. It is in <a href="http://help.clicksend.com/what-is-a-unix-timestamp"
            target="_blank">Unix format</a>.
          example: 1436871253
          type: integer
        to:
          description: The phone number of the recipient. It should be in <a href="https://en.wikipedia.org/wiki/E.164"
            target="_blank">E.164 format</a>.
          example: "+61411111111"
          type: string
        body:
          description: "The message sent. The price of sending a message depends on\
            \ the number of characters and the type of message. There are two types:\n\
            \n- Standard message - Contains only characters in the <a href=\"https://en.wikipedia.org/wiki/GSM_03.38\"\
            \ target=\"_blank\">GSM</a> set, with a maximum of 160 characters.\n \
            \   \n- Unicode message - Contains characters outside the <a href=\"https://en.wikipedia.org/wiki/GSM_03.38\"\
            \ target=\"_blank\">GSM</a> set, with a maximum of 70 characters.\n  \
            \  \n\nLonger messages will be sent as multiple messages (parts), but\
            \ the recipient will receive them as a single long message. Visit <a href=\"\
            https://help.clicksend.com/article/h474eseq3a-how-many-characters-can-i-send-in-an-sms\"\
            \ target=\"_blank\">this page</a> to learn more about the number of characters\
            \ per message, and <a href=\"http://smscharactercount.com/\" target=\"\
            _blank\">this page</a> to count the number of characters."
          example: Jelly liquorice marshmallow candy carrot cake 4Eyffjs1vL.
          type: string
        from:
          description: "The sender of the message. This is also referred to as the\
            \ **Sender ID**. If your **Sender ID** has a different country code to\
            \ the recipient’s, it'll be replaced by a local number, except in <a href=\"\
            https://help.clicksend.com/category/mfdctha7f0-country-specific-features-and-restrictions\"\
            \ target=\"_blank\">certain countries</a>. If the sender number is blocked,\
            \ a different number will replace it."
          example: sendmobile
          type: string
        schedule:
          description: The scheduled date of the message. It is in <a href="http://help.clicksend.com/what-is-a-unix-timestamp"
            target="_blank">Unix format</a>.
          example: 1436874701
          type: integer
        message_id:
          description: The generated ID of the message. This ID is typically used
            as a reference for <a href="https://www.clicksend.com/au/help/" target="_blank">customer
            support</a> in case of any issues.
          example: BF7AD270-0DE2-418B-B606-71D527D9C1AE
          type: string
        message_parts:
          description: "The number of parts the message was broken into. To look at\
            \ how many parts your message is broken down into, use the **<a href=\"\
            http://smscharactercount.com/\">SMS Character Count</a>**."
          example: 1
          type: integer
        message_price:
          description: The price of this message. This depends on the total number
            of parts of the message.
          example: "0.07"
          type: string
        from_email:
          description: "The email address to which replies should be emailed to. If\
            \ omitted, the reply will be emailed back to the user who sent the outgoing\
            \ SMS."
          example: john@example.com
          nullable: true
          type: string
        list_id:
          description: The _list_id_ of the contact list the message was sent to.
            This parameter will have a **null** value if you didn’t send to a list
            in the request.
          example: "1"
          nullable: true
          type: string
        custom_string:
          description: A note that was sent from the request.
          example: this is a test
          nullable: true
          type: string
        contact_id:
          description: This is the ID of the contact. This parameter will have a **null**
