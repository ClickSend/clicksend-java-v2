  /v3/voice/send:
    post:
      description: "_Send voice message(s)_\n\nSend TTS (Text-to-speech) voice calls\n\
        \n### How many messages can I send?\n\nYou can post **up to 1000 messages**\
        \ with each API call. You can send to a mix of contacts and contact lists,\
        \ as long as the total number of recipients is up to 1000. The response contains\
        \ a status and details for each recipient.\n\n### How many characters can\
        \ I send in a message?\n\nIf a message is longer than 4 message parts, it\
        \ will be truncated (see below). If a message contains any characters that\
        \ aren't in the GSM 03.38 character set, the message type will be treated\
        \ as unicode. (`https://en.wikipedia.org/wiki/GSM_03.38`)\n\n### _Standard\
        \ English Characters:_\n\n| Number of Characters | Message Credits |\n| ---\
        \ | --- |\n| 1 - 300 | 1 |\n| 301 - 600 | 2 |\n| 601 - 900 | 3 |\n| 901 -\
        \ 1200 | 4 |\n\n### _Non-GSM (Unicode) characters:_\n\n| Number of Characters\
        \ | Message Credits |\n| --- | --- |\n| 1 - 150 | 1 |\n| 151 - 300 | 2 |\n\
        | 301 - 450 | 3 |\n| 451 - 600 | 4 |\n\n### _Allowed Languages_\n\n| Language,\
        \ Locale | lang | voice |\n| --- | --- | --- |\n| `English`, US | en-us |\
        \ female (default) / male |\n| `English`, Australia | en-au | female (default)\
        \ / male |\n| `English`, UK | en-gb | female (default) / male |\n| `English`,\
        \ India | en-in | female |\n| `English`, Wales | en-gb-wls | female (default)\
        \ / male |\n| `Celtic`, Wales | cy-gb-wls | female (default) / male |\n| `German`,\
        \ Germany | de-de | female (default) / male |\n| `Spanish`, Spain | es-es\
        \ | female (default) / male |\n| `Spanish`, US | es-us | female (default)\
        \ / male |\n| `French`, Canada | fr-ca | female |\n| `French`, France | fr-fr\
        \ | female (default) / male |\n| `Icelandic`, Iceland | is-is | female (default)\
        \ / male |\n| `Italian`, Italy | it-it | female (default) / male |\n| `Danish`,\
        \ Denmark | da-dk | female (default) / male |\n| `Dutch`, Netherlands | nl-nl\
        \ | female (default) / male |\n| `Norwegian`, Norway | nb-no | female |\n\
        | `Polish`, Poland | pl-pl | female (default) / male |\n| `Portuguese`, Portugal\
        \ | pt-pt | male |\n| `Portuguese`, Brazil | pt-br | female (default) / male\
        \ |\n| `Romanian`, Romania | ro-ro | female |\n| `Russian`, Russia | ru-ru\
        \ | female (default) / male |\n| `Swedish`, Sweden | sv-se | female |\n| `Turkish`,\
        \ Turkey | tr-tr | female |\n\n_Tips_\n\nTo introduce a small delay between\
        \ words or digits you can use a comma (,).\n\nFor example: `Please enter your\
        \ activation code 9, 0, 9, 0, in the next 20 minutes.`\n\nWe support some\
        \ SSML tags allowing custom breaks or pauses to be entered, and the readout\
        \ rate to be altered.\n\n[More info...](https://help.clicksend.com/en/articles/42982-customising-text-to-voice-output)\n\
        \n### Properties\n\n| Name | Type | Required | Restrictions | Description\
        \ |\n| --- | --- | --- | --- | --- |\n| to | string | true | none | Your phone\
        \ number in [E.164](https://en.wikipedia.org/wiki/E.164) format. |\n| body\
        \ | string | true | none | Biscuit uv3nlCOjRk croissant chocolate lollipop\
        \ chocolate muffin. |\n| voice | string | true | none | Either 'female' or\
        \ 'male'. |\n| custom_string | string | true | none | Your reference. Will\
        \ be passed back with all replies and delivery reports. |\n| country | string\
