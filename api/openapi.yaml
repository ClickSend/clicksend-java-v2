paths:
  /v3/sms/send:
    post:
      description: "Use this endpoint to send messages to your recipients, either\
        \ as phone numbers or contacts from your contact list. \nThe sender of the\
        \ message (<a href=\"https://help.clicksend.com/article/4kgj7krx00-what-is-a-sender-id-or-sender-number\"\
        \ target=\"_blank\"><strong>Sender ID</strong></a>) can be a shared number,\
        \ a dedicated number, alpha tag (business name), or your own number. \nYou\
        \ can send messages both locally and globally, subject to the country restrictions.\
        \ The cost of sending messages varies based on the <a href=\"https://help.clicksend.com/article/h474eseq3a-how-many-characters-can-i-send-in-an-sms\"\
        \ target=\"_blank\">type</a> and length of the message."
      operationId: send-sms
      parameters:
      - example: application/json
        explode: false
        in: header
        name: Content-Type
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              basic_example:
                summary: Basic example with two messages
                value:
                  messages:
                  - source: php
                    body: Jelly liquorice marshmallow candy carrot cake 4Eyffjs1vL.
                    to: "+61411111111"
                  - source: php
                    body: Chocolate bar icing icing oat cake carrot cake jelly cotton
                      MWEvciEPIr.
                    to: "+61422222222"
              smart_assign_example:
                summary: Example using senders parameter of the smart assign feature
                value:
                  senders:
                  - recipient_country_code: AU
                    sender_id: ClickSend
                  - recipient_country_code: US
                    sender_id: "+14155552345"
                  - recipient_country_code: CA
                    sender_id: "+18338611041"
                  shorten_urls: false
                  messages:
                  - body: Hello from ClickSend! This is a test message.
                    to: "+61411111111"
                  - body: Hello from ClickSend! This is another test message to US.
                    to: "+14155552345"
                    custom_string: Test message 001
                  - body: Hello from ClickSend! This is another test message to CA.
                    to: "+15142250543"
            schema:
              $ref: "#/components/schemas/send_sms_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/send-sms"
          description: Successful response
      security:
      - basicAuth: []
      summary: Send SMS
      tags:
      - sms
      x-codeSamples:
      - lang: curl
        source: |-
          curl --include \
               --header "Authorization: Basic YXBpLXVzZXJuYW1lOmFwaS1wYXNzd29yZA=="  \
               --request POST \
               --header "Content-Type: application/json" \

               --data-binary "    {
                  \"messages\":[
                      {
                          \"source\":\"php\",
                          \"body\":\"Jelly liquorice marshmallow candy carrot cake 4Eyffjs1vL.\",
                          \"to\":\"+61411111111\"
                      },
                      {
                          \"source\":\"php\",
                          \"body\":\"Chocolate bar icing icing oat cake carrot cake jelly cotton MWEvciEPIr.\",
                          \"to\":\"+61422222222\"
                      }
                  ]
              }" \
          'https://rest.clicksend.com/v3/sms/send'
      - lang: PHP
        source: "<?php\nrequire_once(__DIR__ . '/vendor/autoload.php');\n\n// Configure\
          \ HTTP basic authorization: BasicAuth\n$config = ClickSend\\Configuration::getDefaultConfiguration()\n\
          \              ->setUsername('USERNAME')\n              ->setPassword('API_KEY');\n\
          \n$apiInstance = new ClickSend\\Api\\SMSApi(new GuzzleHttp\\Client(),$config);\n\
          $msg = new \\ClickSend\\Model\\SmsMessage();\n$msg->setBody(\"test body\"\
          ); \n$msg->setTo(\"0451111111\");\n$msg->setSource(\"sdk\");\n\n// \\ClickSend\\\
          Model\\SmsMessageCollection | SmsMessageCollection model\n$sms_messages\
          \ = new \\ClickSend\\Model\\SmsMessageCollection(); \n$sms_messages->setMessages([$msg]);\n\
          \ntry {\n    $result = $apiInstance->smsSendPost($sms_messages);\n    print_r($result);\n\
          } catch (Exception $e) {\n    echo 'Exception when calling SMSApi->smsSendPost:\
          \ ', $e->getMessage(), PHP_EOL;\n}\n?>"
      - lang: C#
        source: "using IO.ClickSend.ClickSend.Api;\nusing IO.ClickSend.Client;\nusing\
          \ IO.ClickSend.ClickSend.Model;\n\nvar configuration = new Configuration()\n\
          {\n    Username = USERNAME, \n    Password = API_KEY  \n};\nvar smsApi =\
          \ new SMSApi(configuration);\n\nvar listOfSms = new List<SmsMessage>\n{\n\
          \    new SmsMessage(\n        to: \"+61411111111\", \n        body: \"test\
          \ message\", \n        source: \"sdk\"\n    )\n};\n\nvar smsCollection =\
          \ new SmsMessageCollection(listOfSms);\nvar response = smsApi.SmsSendPost(smsCollection);"
      - lang: Java
        source: |-
          package ClickSend;

          import java.util.Arrays;
          import java.util.List;
          import ClickSend.Api.SmsApi;
          import ClickSend.Model.SmsMessage;
          import ClickSend.Model.SmsMessageCollection;

          public class send_sms {
            public static void main(String[] args) {
              ApiClient defaultClient = new ApiClient();
              defaultClient.setUsername("USERNAME");
              defaultClient.setPassword("API_KEY");
              SmsApi apiInstance = new SmsApi(defaultClient);

              SmsMessage smsMessage=new SmsMessage();
              smsMessage.body("body");
              smsMessage.to("to");
              smsMessage.source("source");

              List<SmsMessage> smsMessageList=Arrays.asList(smsMessage);
              // SmsMessageCollection | SmsMessageCollection model
              SmsMessageCollection smsMessages = new SmsMessageCollection();
              smsMessages.messages(smsMessageList);
              try {
                  String result = apiInstance.smsSendPost(smsMessages);
                  System.out.println(result);
              } catch (ApiException e) {
                  System.err.println("Exception when calling SmsApi#smsSendPost");
                  e.printStackTrace();
              }
            }
          }
      - lang: Node.js
        source: |-
          var api = require('./api.js');

          var smsApi = new api.SMSApi("USERNAME", "API_KEY");

          var smsMessage = new api.SmsMessage();

          smsMessage.source = "sdk";
          smsMessage.to = "+0451111111";
          smsMessage.body = "test message";

          var smsCollection = new api.SmsMessageCollection();

          smsCollection.messages = [smsMessage];

          smsApi.smsSendPost(smsCollection).then(function(response) {
            console.log(response.body);
          }).catch(function(err){
            console.error(err.body);
          });
      - lang: Ruby
        source: |-
          # load the gem
          require 'clicksend_client'
          require 'json'

          # setup authorization
          ClickSendClient.configure do |config|
            # Configure HTTP basic authorization: BasicAuth
            config.username = 'USERNAME'
            config.password = 'API_KEY'
          end

          api_instance = ClickSendClient::SMSApi.new

          # SmsMessageCollection | SmsMessageCollection model
          sms_messages = ClickSendClient::SmsMessageCollection.new

          sms_messages.messages = [
            ClickSendClient::SmsMessage.new(
              "to": "+61411111111",
              "source": "sdk",
              "body": "body"
            ),
            ClickSendClient::SmsMessage.new(
              "to": "+61422222222",
              "source": "sdk",
              "body": "body"
            )
          ]

          begin
            # Send sms message(s)
            result = api_instance.sms_send_post(sms_messages)
            p JSON.parse(result)
          rescue ClickSendClient::ApiError => e
            puts "Exception when calling SMSApi->sms_send_post: #{e.response_body}"
          end
      - lang: Python
        source: |-
          from __future__ import print_function
          import clicksend_client
          from clicksend_client import SmsMessage
          from clicksend_client.rest import ApiException


          # Configure HTTP basic authorization: BasicAuth
          configuration = clicksend_client.Configuration()
          configuration.username = 'USERNAME'
          configuration.password = 'API_KEY'

          # create an instance of the API class
          api_instance = clicksend_client.SMSApi(clicksend_client.ApiClient(configuration))

          # If you want to explictly set from, add the key _from to the message.
          sms_message = SmsMessage(source="php",
                                  body="Jelly liquorice marshmallow candy carrot cake 4Eyffjs1vL.",
                                  to="+61411111111",
                                  schedule=1436874701)

          sms_messages = clicksend_client.SmsMessageCollection(messages=[sms_message])

          try:
              # Send sms message(s)
              api_response = api_instance.sms_send_post(sms_messages)
              print(api_response)
          except ApiException as e:
              print("Exception when calling SMSApi->sms_send_post: %s\n" % e)
      - lang: perl
        source: |-
          use WWW::ClickSendClient::SMSApi;
          use WWW::ClickSendClient::Object::SmsMessageCollection;

          my $username = 'YOUR_API_USER_NAME';
          my $password = 'YOUR_API_PASSWORD';

          my $api = WWW::ClickSendClient::SMSApi->new(username => $username, password => $password);

          my %params = (
              'messages' => [
                  {
                      'source'        => 'perl',
                      'body'          => 'Jelly liquorice marshmallow candy carrot cake 4Eyffjs1vL.',
                      'to'            => '+61411111111'
                  },
                  {
                      'source'        => 'perl',
                      'body'          => 'Chocolate bar icing icing oat cake carrot cake jelly cotton MWEvciEPIr.',
                      'to'            => '+61422222222'
                  }
              ]
          );

          #You can post up to 1000 messages

          my $messages_obj = WWW::ClickSendClient::Object::SmsMessageCollection->new(%params);
          my $json_output = $api->sms_send_post('sms_messages' => $messages_obj);

          print $json_output;
      - lang: objc
        source: |-
          #import "CSSMSApi.h"
          #import "CSSmsMessage.h"

          CSDefaultConfiguration *apiConfig = [CSDefaultConfiguration sharedConfig];
          // Configure HTTP basic authorization (authentication scheme: BasicAuth)
          [apiConfig setUsername:@"YOUR_USERNAME"];
          [apiConfig setPassword:@"YOUR_PASSWORD"];

          CSSmsMessage *smsMessage1 = [[CSSmsMessage alloc] init];
          smsMessage1.to = @"+0451111111";
          smsMessage1.source = @"objc";
          smsMessage1.body = @"Chocolate bar icing icing oat cake carrot cake jelly cotton MWEvciEPIr.";

          CSSmsMessage *smsMessage2 = [[CSSmsMessage alloc] init];
          smsMessage2.listId = @"1234";
          smsMessage2.source = @"objc";
          smsMessage2.body = @"Chocolate bar icing icing oat cake carrot cake jelly cotton MWEvciEPIr.";


          CSSmsMessageCollection *smsMessageCollection = [[CSSmsMessageCollection alloc] init];
          smsMessageCollection.messages = (NSArray<CSSmsMessage> *) @[smsMessage1, smsMessage2];

          CSSMSApi *smsAPI = [[CSSMSApi alloc] init];
          [smsAPI smsSendPostWithSmsMessages:smsMessageCollection completionHandler:^(NSString *output, NSError *error) {
              if (error) {
                  NSLog(@"Error: %@", error);
              } else {
                  NSLog(@"%@", output);
              }
          }];
      - lang: swift
        source: "import Alamofire\n\nif let authHeader = Request.authorizationHeader(user:\
          \ \"USERNAME\", password: \"PASSWORD\") {\n    ClickSendClientAPI.customHeaders\
          \ = [authHeader.key : authHeader.value]\n}\n\nlet message1 = SmsMessage(body:\
          \ \"Chocolate bar icing icing oat cake carrot cake jelly cotton MWEvciEPIr.\"\
          , \n                        to: \"+0451111111\", \n                    \
          \    source: \"swift\")\n\nlet message2 = SmsMessage(body: \"Chocolate bar\
          \ icing icing oat cake carrot cake jelly cotton MWEvciEPIr.\", \n      \
          \                  source: \"swift\", \n                        listId:\
          \ 1234)\n\nlet smsCollection = SmsMessageCollection(messages: [message1,\
          \ message2])\nSMSAPI.smsSendPost(smsMessages: smsCollection) { (dataString,\
          \ error) in\n\n    guard let dataString = dataString else {\n        print(error!)\n\
          \        return\n    }\n\n    if let data = dataString.data(using: String.Encoding.utf8)\
          \ {\n        do {\n            if let dictonary = try (JSONSerialization.jsonObject(with:\
          \ data, options: []) as? NSDictionary) {\n                print(dictonary)\n\
          \            } else {\n                print(\"bad json\")\n           \
          \ }\n        } catch let error as NSError {\n            print(error)\n\
          \        }\n    }\n}"
      x-content-type: application/json
      x-accepts:
      - application/json
