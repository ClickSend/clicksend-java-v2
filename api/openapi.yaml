    create_test_sms_receipt_data:
      description: The parameters related to the message receipt.
      example:
        timestamp_send: 1722565411
        timestamp: 1722565411
        message_id: 2336751A-BBBE-4887-9D7C-CB7558F00208
        status_code: 201
        status_text: "Success: Message received on handset."
        error_code: 0
        error_text: error_text
        custom_string: custom_string
        subaccount_id: 563840
        message_type: sms
        digits: 6
      properties:
        timestamp_send:
          description: The time you sent the test message. It is in <a target="_blank"
            href="http://help.clicksend.com/what-is-a-unix-timestamp">Unix format.</a>
          example: 1722565411
          type: integer
        timestamp:
          description: The time you receive the test message receipt. It is in <a
            target="_blank" href="http://help.clicksend.com/what-is-a-unix-timestamp">Unix
            format.</a>
          example: 1722565411
          type: integer
        message_id:
          description: |-
            The generated ID of the message. This ID is typically used as a reference for <a target="_blank" href="https://www.clicksend.com/au/help/">customer support</a> in case of any issues.

            <div class="info-box">
              <h4><i class="fas fa-info-circle"></i> Note:</h4>
              <p>This <em>message_id</em> is different from the ID that is generated when sending or receving an actual SMS. This ID is used for testing only.</p>
            </div>
          example: 2336751A-BBBE-4887-9D7C-CB7558F00208
          type: string
        status_code:
          description: The status code that is sent from the <a target="_blank" href="https://en.wikipedia.org/wiki/SMS_gateway">SMS
            gateway.</a> Visit <a target="_blank" href="https://help.clicksend.com/article/8cc479qlbb-list-of-sms-gateway-error-codes">this
            page</a> for more information.
          example: 201
          type: integer
        status_text:
          description: A message describing the _status_code_ of the operation. Visit
            <a target="_blank" href="https://help.clicksend.com/article/8cc479qlbb-list-of-sms-gateway-error-codes">this</a>
            page for more information.
          example: "Success: Message received on handset."
          type: string
        error_code:
          description: "The error code of the operation. Visit <a target=\"_blank\"\
            \ href=\"https://help.clicksend.com/article/8cc479qlbb-list-of-sms-gateway-error-codes\"\
            >this page</a> for more information. If no error occurred, the value is\
            \ **null**."
          nullable: true
          type: integer
          example: null
        error_text:
          description: "A message describing the _error_code_ of the operation. Visit\
            \ <a target=\"_blank\" href=\"https://help.clicksend.com/article/8cc479qlbb-list-of-sms-gateway-error-codes\"\
            >this page</a> for more information. If no error occurred, the value is\
            \ **null**."
          nullable: true
          type: string
          example: null
        custom_string:
          description: |-
            A note that was sent from the request.

            <div class="warning-box">
              <h4><i class="fas fa-exclamation-triangle"></i> Warning:</h4>
              <p>This parameter is deprecated and will return <strong>null.</strong></p>
            </div>
          nullable: true
          type: string
          example: null
        subaccount_id:
          description: The sub-account of the user. A user can have multiple sub-accounts.
          example: 563840
          type: integer
        message_type:
          description: "The type of message (e.g. SMS, MMS, etc)."
          example: sms
          type: string
        digits:
          description: |-
            The numbers that the recipient pressed on their keypad during the call. A **null** value is returned if the recipient didn't provide any input.

            <div class="info-box">
              <h4><i class="fas fa-info-circle"></i> Note:</h4>
              <p>This parameter is only relevant to <a href="/messaging/voice-messaging/"><strong>Voice Messaging</strong></a> receipts.</p>
            </div>
          nullable: true
          type: integer
          example: null
      type: object
