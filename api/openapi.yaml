        \ and details for each recipient.\n\nRefer to [<b>Application Status Codes</b>](/#application-status-codes)\
        \ for the possible response message status strings.\n\n### **How many characters\
        \ can I send in a message?**\n\n### Standard MMS Message\n\n1500 characters\n\
        \n### Unicode MMS Message\n\n500 characters\n\nIf a message is longer the\
        \ allowed number of characters it will be truncated. If a message contains\
        \ any characters that aren't in the GSM 03.38 character set, the message type\
        \ will be treated as unicode. ([https://en.wikipedia.org/wiki/GSM_03.38](https://en.wikipedia.org/wiki/GSM_03.38))\n\
        \n### Maximum File Size\n\nYou can send a single attachment with a size of\
