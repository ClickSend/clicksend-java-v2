            - 3: Action required on your number registration. Please resolve to start using it.
            - 4: You can send to all countries but may get restricted to some before full registration.
            - 5: Your number is registered and you can start using it immediately.
          enum:
          - 0
          - 1
          - 2
          - 3
          - 4
          - 5
          example: 0
          type: integer
        label:
          description: "Status label identifier corresponding to the numeric value\
            \ above, following the same order."
          enum:
          - REGISTRATION_NOT_REQUIRED
          - REGISTRATION_NOT_INITIATED
          - REGISTRATION_INITIATED
          - CUST_ACTION_REQUIRED
          - REGISTRATION_SUBMITTED
          - REGISTERED
          example: REGISTRATION_NOT_REQUIRED
          type: string
        description:
          description: Human readable description of the status.
          example: Your number is ready to go.
          type: string
        name:
          description: "Display name for the status corresponding to the numeric value\
            \ above, following the same order."
          enum:
          - Ready to use
          - Unregistered
          - Decision Pending
          - Action Required
          - Limited Availability
          - Registered
          example: Ready to use
          type: string
      type: object
