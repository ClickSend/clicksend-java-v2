openapi: 3.0.0
info:
  description: |-
    You can use the SMS endpoints to send and manage SMS, check the cost of sending SMS, view message history, and more. Integrate them into your system as part of your workflow.

    Relevant guides: <a href="https://help.clicksend.com/article/h474eseq3a-how-many-characters-can-i-send-in-an-sms" target="_blank">How many characters can I send in an SMS?</a>, <a href="https://help.clicksend.com/article/1hd33n2xns-sms-status-delivery-receipt-expired" target="_blank">SMS status delivery receipt expired</a>, <a href="https://help.clicksend.com/en/articles/42195-unicode-vs-plain-text" target="_blank">Do you support non-English characters</a>, and <a href="https://help.clicksend.com/category/mfdctha7f0-country-specific-features-and-restrictions" target="_blank">Country Specific Features and Restrictions</a>.
    <div class="info-box">
      <h4><i class="fas fa-info-circle"></i> Note :</h4>
      ClickSend is pausing SMS messages containing URLs for new customers. Please remove links from messages to maintain uninterrupted delivery, or <a href="https://www.clicksend.com/gb/help/" target="_blank">contact support</a> to apply for approval for URL messaging.
    </div>
  title: SMS
