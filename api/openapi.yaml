          $ref: "#/components/schemas/calculate_sms_price_data__summary_countries_inner_country_regulation"
        registration_status_id:
          description: Your current registration status for this country. This parameter
            is used by the internal team to track the status of your registration.
          type: integer
        registration_entity_id:
          description: "The global sending requirement for this country. It can be\
            \ one of the following:\n\n- **0:** No number or account registration\
            \ required.\n    \n- **1:** Number registration required. You can purchase\
            \ a registered number from ClickSend. Examples: US and CA.\n    \n- **2:**\
            \ Account registration required. You can register your company details\
            \ or business details to register your account. Examples: NZ, SG and UAE.\n\
            \  \nThis parameter is a duplicate of registration_type. It determines\
            \ which form you need for the global sending registration process.\n\n\
            <div class=\"info-box\">\n  <h4><i class=\"fas fa-info-circle\"></i> Note:</h4>\n\
            \  <p>This parameter is static. Its value can’t change based on your settings.</p>\n\
            </div>"
          type: integer
        jotform_id:
          description: "The Jotform identifier for your account. It’s used to track\
            \ the global sending registration form. If it is **null**, no Jotform\
            \ is assigned to you. It is used only for number and account registration."
          type: integer
      type: object
    calculate_sms_price_data__summary_countries_inner:
      properties:
        country:
          $ref: "#/components/schemas/calculate_sms_price_data__summary_countries_inner_country"
      type: object
    calculate_sms_price_data__summary:
      description: The parameters for additional summary. It shows the guidelines
        for each country you have selected.
      properties:
        test_message:
          description: This parameter is used for internal developers. This is used
            when your account is in trial period.
          type: string
        countries:
          description: "The list of countries of the receipients in two-letter format\
            \ (e.g. US, UK, AU, NZ, etc)."
          items:
            $ref: "#/components/schemas/calculate_sms_price_data__summary_countries_inner"
          type: array
      type: object
    calculate_sms_price_data:
      description: The parameters related to the messages price.
      properties:
        total_price:
          description: "The total price of sending the messages. Visit [this page](/#status-codes)\
            \ for more information."
          example: 0.2264
          type: number
        total_count:
          description: The total number of messages sent from the request.
          example: 1
          type: integer
        queued_count:
          description: |-
            The messages will be put in a queue if it goes through the validation process. The validation process checks whether the **Sender ID** is registered or not. Some countries don't require messages to go through the validation process.

            Messages scheduled to be sent right away will be sent immediately. If not, it will be queued.
          example: 1
          type: integer
        messages:
          description: The parameters related to messages.
          items:
            $ref: "#/components/schemas/sms"
          type: array
        _currency:
          $ref: "#/components/schemas/currency"
        _summary:
          $ref: "#/components/schemas/calculate_sms_price_data__summary"
        blocked_count:
          description: "The number of messages unable to be sent. This is often caused\
            \ by:\n\n- Receipient’s country not enabled for global sending.\n    \n\
            - Sender ID resitriction.\n    \n- Number registration restrcition."
          type: integer
      type: object
