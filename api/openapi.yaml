      description: Use this endpoint to view previously sent SMS. You can filter the
        SMS history result using the query parameters.
      operationId: view-sms-history
      parameters:
      - example: application/json
        explode: false
        in: header
        name: Content-Type
        required: false
        schema:
          type: string
        style: simple
      - description: "The page number to retrieve. Use this parameter to navigate\
          \ through the [pagination](/#pagination) results. The default value is 1."
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          example: 1
          type: integer
        style: form
