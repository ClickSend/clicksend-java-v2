  /v3/fax/send:
    post:
      description: "### **Supported File Types**\n\n- Supported file types are listed\
        \ below. If you need to convert a file to a supported format, it can be first\
        \ passed to our uploads endpoint: `/uploads?convert=fax`\n- This will return\
        \ a URL to the converted pdf file that can be used in the /fax/send endpoint.\n\
        - Contact us to add support for any other file type.\n    \n\n### Documents\n\
        \n| File type | Required to be passed to uploads endpoint first? |\n| ---\
        \ | --- |\n| pdf | No |\n| docx | Yes |\n| doc | Yes |\n| rtf | Yes |\n\n\
        _Send a fax using supplied supported file-types._\n\n### **Letter File Options**\n\
        \n### Use existing URL\n\nWith this option, you can use an existing URL to\
        \ a `pdf` document. For example, you might generate the `pdf` on your server.\n\
        \nWhen using an existing url make sure that it is publicly accessible as it\
        \ will not work if it is private.\n\n### Upload File to Our Server\n\nWith\
        \ this option, you can use the [/uploads](/#upload-media-file) endpoint to\
        \ upload the document. The `/uploads` endpoint returns a URL that can be used\
        \ in the `/fax/send` endpoint.\n\n### Properties\n\n| Name | Type | Required\
        \ | Restrictions | Description |\n| --- | --- | --- | --- | --- |\n| file_url\
        \ | string | true | none | URL of file to send |\n| source | string | true\
        \ | none | Your method of sending e.g. 'wordpress', 'php', 'c#'. |\n| to |\
        \ string | true | none | Recipient fax number in [E.164](https://en.wikipedia.org/wiki/E.164)\
        \ format. |\n| list_id | integer(int32) | false | none | Your list ID if sending\
        \ to a whole list. Can be used instead of 'to'. |\n| from | string | true\
        \ | [yes](http://help.clicksend.com/SMS/what-is-a-sender-id-or-sender-number)\
        \ | Your sender id. Must be a valid fax number. |\n| schedule | integer(int32)\
        \ | false | none | Leave blank for immediate delivery. Your schedule time\
