          the size of each page of results. The default value is 15.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 15
          example: 15
          maximum: 100
          minimum: 15
          type: integer
        style: form
      - description: "Allows filtering of results based on your search criteria. The\
          \ query should be in the format `field_name:value`.\n\n1. **Field Name**:\
          \ The field within the SMS history you want to filter by. You can use the\
          \ following fields:\n    \n    - _Status_: The status of the SMS. Available\
          \ values for status are: Queued, Completed, Scheduled, WaitApproval, Failed,\
          \ Cancelled, CancelledAfterReview, Received, Sent.\n        \n    - _To_:\
          \ The recipient of the SMS.\n        \n    - _from_: The sender of the SMS.\n\
          \        \n    - _subaccount_id_: The sub-account identifier.\n        \n\
          \    - _message_id_: The ID of your SMS.\n        \n2. **Value**: The text\
          \ or keyword you're searching for within the specified field. If left empty\
          \ after the colon, the filter will look for all templates with any value\
          \ in the **Field Name**.           \n\nFor example, if you are searching\
          \ for a SMS with the status of Scheduled, the final query would look like\
          \ this:\n\n  `q=status:Scheduled`\n\n<div class=\"info-box\">\n  <h4><i\
          \ class=\"fas fa-info-circle\"></i> Note:</h4>\n  <div>\n   <p>Some characters\
