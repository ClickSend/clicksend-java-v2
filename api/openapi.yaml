          description: "Indicates whether the country supports trial sending or not:\n\
            \n- **True:** This country supports trial sending\n    \n- **False:**\
            \ This country doesn’t support trial sending\n\nCountries with restricted\
            \ sending typically offers trial sending. With trial sending, you can\
            \ send messages to the country without registering your number or account.\n\
            \n<div class=\"info-box\">\n  <h4><i class=\"fas fa-info-circle\"></i>\
            \ Note:</h4>\n  <p>Trial sending has limitations, such as a daily limit\
