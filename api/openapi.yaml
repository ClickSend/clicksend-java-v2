openapi: 3.0.1
info:
  contact:
    email: support@clicksend.com
  description: |2

    This is an official SDK for [ClickSend](https://clicksend.com)

    Below you will find a current list of the available methods for clicksend.

    *NOTE: You will need to create a free account to use the API. You can register [here](https://dashboard.clicksend.com/#/signup/step1/)..*
  termsOfService: https://www.clicksend.com/au/legal/terms-of-service/
  title: ClickSend v3 API
  version: "3.1"
