  /v3/fax/receipts:
    get:
      description: "_Get List of Fax Receipts_\n\n**Push Delivery Receipts**\n\nIf\
        \ you prefer, we can push message replies to your server as they arrive with\
        \ us.\n\n1. Log into your account.\n2. Click on your profile on the top right.\n\
        3. Then click on the Messaging Settings option.\n4. Click on Fax then Delivery\
        \ Reports.\n5. Click the 'Add New Rule' button.\n6. Select the 'URL' action.\n\
        7. Enter the URL and click 'Save'.\n    \n\nThe following variables will be\
        \ posted to the URL specified:\n\n| Variable | Description |\n| --- | ---\
        \ |\n| `timestamp_send` | Timestamp of the original send request in UNIX format.\
        \ e.g 1439173980 |\n| `timestamp` | Timestamp of delivery report in UNIX format.\
        \ e.g 1439173981 |\n| `message_id` | Message ID, returned when originally\
        \ sending the message. |\n| `status` | Delivered or Undelivered |\n| `status_code`\
        \ | Status code. Refer to 'Fax Delivery Status Codes' in docs. |\n| `status_text`\
        \ | Status text. |\n| `error_code` | Error code. |\n| `error_text` | Error\
        \ text. |\n| `custom_string` | A custom string used when sending the original\
        \ message. |\n| `user_id` | The user ID of the user who sent the message.\
        \ |\n| `subaccount_id` | The subaccount ID of the user who sent the message.\
        \ |\n| `message_type` | 'fax' (constant). |\n\n**Pull Delivery Receipts**\n\
        \nReceive delivery reports by polling. You can poll our server and retrieve\
        \ delivery reports at a time that suits you.\n\n1. Log into your account.\n\
        2. Click on your profile on the top right.\n3. Then click on the Messaging\
        \ Settings option.\n4. Click on Fax then Delivery Rules.\n5. Click the 'Add\
        \ New Rule' button.\n6. Select the 'Poll' action.\n7. Then click 'Save'.\n\
        \    \n\nRefer to [Status Codes](/#status-codes) for definitions of HTTP status\
        \ code responses.\n\n\n<div style=\"background-color: #FF6A4B; padding: 10px;\
        \ border-radius: 8px;\">\n  <span style=\"color: white;\">This endpoint requires\
        \ authentication,</span> \n  <a href=\"/docs/#authentication\" style=\"color:\
        \ white; text-decoration: underline;\">more info...</a>\n</div>"
      operationId: view-fax-receipts
