            \ _Completed_\n- _Scheduled_\n- _WaitApproval_\n- _Failed_\n- _Cancelled_\n\
            - _CancelledAfterReview_\n- _Received_\n- _Sent_\n\nThis parameter reflects\
            \ the actual status of the SMS. It is based on the \nstatus of the SMS\
            \ sent from the <a href=\"https://en.wikipedia.org/wiki/SMS_gateway\"\
            \ target=\"_blank\">SMS gateway</a>, which is different \nfrom the [API\
            \ status code](https://developers-dev.clicksend.net/docs/#status-codes).\
            \ Visit <a href=\"https://help.clicksend.com/article/8cc479qlbb-list-of-sms-gateway-error-codes\"\
            \ target=\"_blank\">this page</a> for more information."
          example: Completed
          type: string
        from:
          description: The sender of the message.
          example: sendlist
          type: string
        schedule:
          description: The scheduled date of the message. It is in <a href="http://help.clicksend.com/what-is-a-unix-timestamp"
            target="_blank">Unix format</a>.
          example: "1436879372"
          type: string
        status_code:
          description: The status code sent from the <a href="https://en.wikipedia.org/wiki/SMS_gateway"
            target="_blank">SMS gateway</a>. Visit <a href="https://help.clicksend.com/article/8cc479qlbb-list-of-sms-gateway-error-codes"
            target="_blank">this page</a> for more information.
          type: string
          example: null
        status_text:
          description: A message describing the _status_code_ of the operation. Visit
            <a href="https://help.clicksend.com/article/8cc479qlbb-list-of-sms-gateway-error-codes"
            target="_blank">this page</a> for more information.
          type: string
          example: null
        error_code:
          description: "The error code of the operation. Visit <a href=\"https://help.clicksend.com/article/8cc479qlbb-list-of-sms-gateway-error-codes\"\
            \ target=\"_blank\">this page</a> for more information. If no error occurred,\
            \ the value is **null**."
          nullable: true
          type: string
          example: null
        error_text:
          description: "A message describing the _error_code_ of the operation. Visit\
            \ <a href=\"https://help.clicksend.com/article/8cc479qlbb-list-of-sms-gateway-error-codes\"\
            \ target=\"_blank\">this page</a> for more information. If no error occurred,\
            \ the value is **null**."
          nullable: true
          type: string
          example: null
        message_id:
          description: The generated ID of the message.
          example: 4E90F4C3-43A3-489D-9AB8-DA1F4332A0C3
          type: string
        message_parts:
          description: "The number of parts the message was broken into. To look at\
            \ how many parts your message is broken down into, use the <a href=\"\
            http://smscharactercount.com/\" target=\"_blank\"><strong>SMS Character\
            \ Count</strong></a>."
          example: "1.00"
          type: string
        message_price:
          description: The price of this message. This depends on the total number
            of parts of the message.
          example: "0.070000"
          type: string
        from_email:
          description: "The email address to which replies should be emailed to. If\
            \ omitted, the reply will be emailed back to the user who sent the outgoing\
            \ SMS"
          type: string
          example: null
        list_id:
          description: The _list_id_ of the contact list the message was sent to.
            This parameter will have a **null** value if you didn’t send to a list
            in the request.
          nullable: true
          type: string
          example: null
        custom_string:
          description: "A note that was included with the outgoing SMS. If no note\
            \ was included, the value is **null**."
          example: this is a test
          type: string
        contact_id:
          description: This is the ID of the contact. This parameter will have a **null**
            value if you didn’t provide a _contact_id_ in the request.
          example: "1"
          type: string
        user_id:
          description: The unique user ID of the sender.
          example: 1
          type: integer
        subaccount_id:
          description: The sub-account of the user. A user can have multiple sub-accounts.
          example: 1
          type: integer
        country:
          description: "The country of the recipient in two-letter format (e.g. US,\
            \ UK, AU, NZ, etc)."
          example: US
          type: string
        carrier:
          description: The phone carrier of the recipient.
          example: ""
          type: string
        first_name:
          description: "The first name of the recipient. The name will appear if you\
            \ sent the message to a contact from a contact list. If you are sending\
            \ directly to a phone number, the value will be **null**."
          example: John
          nullable: true
          type: string
        last_name:
          description: "The last name of the recipient. The name will appear if you\
            \ sent the message to a contact from a contact list. If you are sending\
            \ directly to a phone number, the value will be **null**."
          example: Doe
          nullable: true
          type: string
        _api_username:
          description: The username of the SMS sender. This can be a <a href="https://dashboard.clicksend.com/account/subaccounts"
            target="_blank">sub-account</a>.
          example: johndoe
          type: string
      type: object
