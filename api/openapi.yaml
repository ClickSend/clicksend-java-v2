    send_sms_request_messages_inner:
      properties:
        body:
          description: "The message to send. The price of sending a message depends\
            \ on the number of characters and the type of message. There are two types:\
            \  \n\n- Standard message - Contains only characters in the <a href=\"\
            https://en.wikipedia.org/wiki/GSM_03.38\" target=\"_blank\">GSM</a> set,\
            \ with a maximum of 160 characters.  \n    \n- Unicode message - Contains\
            \ characters outside the <a href=\"https://en.wikipedia.org/wiki/GSM_03.38\"\
            \ target=\"_blank\">GSM</a> set, with a maximum of 70 characters.  \n\
            \    \nLonger messages will be sent as multiple messages (parts), but\
            \ the recipient will receive them as a single long message. Visit <a href=\"\
            https://help.clicksend.com/article/h474eseq3a-how-many-characters-can-i-send-in-an-sms\"\
            \ target=\"_blank\">this page</a> to learn more about the number of characters\
            \ per message, and <a href=\"http://smscharactercount.com/#/counter\"\
            \ target=\"_blank\">this page</a> to count the number of characters."
          type: string
        to:
          description: |
            The phone number of the recipient. It should be in the international format (<a href="https://en.wikipedia.org/wiki/E.164" target="_blank">E.164</a>). You can send to a contact list using the _list_id_ parameter. You need to provide the _to_ parameter or the _list_id_ parameter.

            <div class="info-box">
              <h4><i class="fas fa-info-circle"></i> Note:</h4>
              <p>To send SMS overseas, enable the <a href="https://help.clicksend.com/article/qdavyt16qs-global-sending" target="_blank">global sending</a> feature on your account either through the <a href="https://dashboard.clicksend.com/global-sending" target="_blank">Dashboard</a>, or by contacting <a href="https://www.clicksend.com/au/help/" target="_blank">customer support</a>.</p>
            </div>
          type: string
        from:
          description: |-
            The sender of the message. This is also referred to as the **<a href="https://help.clicksend.com/article/4kgj7krx00-what-is-a-sender-id-or-sender-number" target="_blank">Sender ID</a>**. You can use:
            - **Shared number:** A number that is randomly selected from a pool if no number is specified. This is not available in the US and Canada. You can’t use a shared number if you have a dedicated number.
            - **Dedicated number:** A number you've purchased from ClickSend. You can purchase a dedicated number using the <a href="https://dashboard.clicksend.com/sender-ids/manage-senders" target="_blank">Dashboard</a> or the [**Purchase Dedicated Number**](/) endpoint. It should be in the international format (<a href="https://en.wikipedia.org/wiki/E.164" target="_blank">E.164</a>).
            - **Alpha tag:** A sender name, like the name of your business, used as the **Sender ID** instead of a number. Recipients cannot reply to an alpha tag. You can register an alpha tag using the <a href="https://dashboard.clicksend.com/sender-ids/manage-senders" target="_blank">dashboard</a> or the **[Request Alpha Tag](/)** endpoint. Check which countries support alpha tags <a href="https://help.clicksend.com/article/532u04vhaq-which-countries-support-alpha-tags" target="_blank">here</a>.
            - **Own number:** Your own number that is connected to your account. Replies from recipients are sent directly to your number. You can register your own number using the <a href="https://dashboard.clicksend.com/sender-ids/manage-senders" target="_blank">dashboard</a> or the [**Request Own Number Verification OTP**](/) endpoint to get the _verification_id_ and OTP code needed for the [**Verify Own Number OTP**](/) endpoint. This isn't available in the US and Canada.
            If your **Sender ID** has a different country code to the recipient’s, it'll be replaced by a local number, except in <a href="https://help.clicksend.com/category/mfdctha7f0-country-specific-features-and-restrictions" target="_blank">certain countries</a>. If the sender number is blocked, a different number will replace it.
          type: string
        source:
          description: "The source of the request. For example, the name of your application.\
            \ It's used to identify messages sent from various applications."
          type: string
        schedule:
          description: The time you want the message to be sent. It should be in <a
            href="http://help.clicksend.com/what-is-a-unix-timestamp" target="_blank">Unix
            format</a>.
          type: integer
        custom_string:
          description: A note that will be sent back to you with the response from
            the endpoint.
          type: string
        list_id:
          description: "The _list_id_ of the contact list to send the message to.\
            \ Use the [**View Contact List**](/contacts/lists/other/view-list-contacts)\
            \ endpoint to see your contact lists. You can also use the other [lists\
            \ endpoints](/contacts/lists/) to create and manage your contact list.\
            \ You need to provide the _to_ parameter or the _list_id_ parameter."
          type: string
        contact_id:
          description: |-
            The _contact_id_ of the contact to send the message to. A _contact_id_ is connected to a _list_id_. Use the Search Contact list endpoint to view the _contact_id_ of the specified number. This parameter will be sent back to you with the response from the endpoint.

            <div class="warning-box">
              <h4><i class="fas fa-exclamation-triangle"></i> Warning:</h4>
              <p>This parameter is no longer in use.</p>
            </div>
          type: integer
        country:
          description: "The country code of the recipient in two-letter format (e.g.\
            \ US, UK, AU, NZ, <a href=\"https://help.clicksend.com/article/7wtbhhy6sy-country-code-calling-code-list\"\
            \ target=\"_blank\">etc</a>)."
          type: string
        from_email:
          description: "The email address to which replies should be emailed to. If\
            \ omitted, the reply will be emailed back to the user who sent the outgoing\
            \ SMS."
          type: string
        exclude_no_sender_id_recipients:
          description: "Used for validating whether the **Sender ID** in registered\
            \ or not. You can either specify:\n\n- **True** - It will begin sending\
            \ messages without validating the Sender ID. If your contact is in a country\
            \ that requires Sender ID validation, your recipient will not received\
            \ it.\n    \n- **False** - It will only send messages if the **Sender\
            \ ID** is registered."
          type: boolean
      required:
      - body
      type: object
    send_sms_request:
      properties:
        senders:
          description: |
            The `senders` property specifies sender IDs for each recipient country.
            - **Want to leverage the default sender settings:**
              - If the `senders` property is missing or left empty, the system uses the default sender settings configured for each recipient country.

            - **Want to override the default sender settings:**
              - When the `senders` property is provided, it should contain valid sender IDs for each recipient country listed under recipients. These IDs will override the default sender settings for the specified countries.
              - If an invalid sender ID is provided, or a sender ID for a specific recipient country is missing, the system will revert to using the default sender settings for that country.
          items:
            $ref: "#/components/schemas/senders_inner"
          type: array
        shorten_urls:
          description: |
            This controls whether URLs are automatically shortened. This affects all messages in the request. You can either specify:

            - **True** - Automatically detects and shortens one URL on each message.
            - **False** - Leaves all URLs in their original form. This is the default value.

            You will be able to retrieve the open rates and statistics for the link from this <a href="/messaging/url-shortening/other/short-url-get-statistics">link</a>.

            More info about shortening URLs <a href="/messaging/url-shortening/"> here</a>.
          type: boolean
        messages:
          description: Messages to send to customers.
          items:
            $ref: "#/components/schemas/send_sms_request_messages_inner"
          type: array
      type: object
