          nullable: true
          type: string
        user_id:
          description: The unique user ID of the sender.
          example: 1
          type: integer
        subaccount_id:
          description: This sub-account of the user. A user can have multiple sub-accounts.
          example: 1
          type: integer
        is_shared_system_number:
          description: "Indicates whether you use a shared number to send a message:\n\
            \n- **True** \\- if the sender is randomly selected.\n    \n- **False**\
