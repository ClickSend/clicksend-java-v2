components:
  schemas:
    SmsCampaign:
      description: Campaign Model for SMS
      discriminator:
        propertyName: classType
      example:
        list_id: 0
        name: name
        body: body
        from: from
        schedule: 0
        url_to_shorten: url_to_shorten
      properties:
        list_id:
          description: Your list id.
          format: int32
          type: integer
        name:
          description: Your campaign name.
          type: string
        body:
          description: Your campaign message.
          type: string
        from:
          description: "Your sender id - more info: https://help.clicksend.com/en/collections/57584-numbers-sender-ids."
          type: string
        schedule:
          default: 0
          description: Your schedule timestamp.
          example: 0
          format: int32
          type: integer
        url_to_shorten:
          description: url to be shortened add http://smsg.io/xxxxx` to the body as
            a placeholder.
          type: string
      required:
      - body
      - list_id
      - name
      type: object
    MmsCampaign:
      description: Campaign Model for MMS
      discriminator:
        propertyName: classType
      example:
        list_id: 0
        name: name
        body: body
        from: from
        schedule: 0
        subject: subject
        media_file: media_file
      properties:
        list_id:
          description: Your list id.
          format: int32
          type: integer
        name:
          description: Your campaign name.
          type: string
        body:
          description: Your campaign message.
          type: string
        from:
          description: "Your sender id - more info: https://help.clicksend.com/en/collections/57584-numbers-sender-ids."
          type: string
        schedule:
          default: 0
          description: Your schedule timestamp.
          example: 0
          format: int32
          type: integer
        subject:
          description: Subject of MMS campaign.
          type: string
        media_file:
          description: URL pointing to media file.
          type: string
      required:
      - body
      - list_id
      - media_file
      - name
      - subject
      type: object
    Address:
      description: Base model for all address-related objects.
      discriminator:
        propertyName: classType
      example:
        address_name: address_name
        address_line_1: address_line_1
        address_city: address_city
        address_postal_code: address_postal_code
        address_country: address_country
        address_line_2: address_line_2
        address_state: address_state
      properties:
        address_name:
          description: Your address name.
          type: string
        address_line_1:
          description: Your address line 1
          type: string
        address_city:
          description: Your city
          type: string
        address_postal_code:
          description: Your postal code
          type: string
        address_country:
          description: Your country
          type: string
        address_line_2:
          description: Your address line 2
          type: string
        address_state:
          description: Your state
          type: string
      required:
      - address_city
      - address_country
      - address_line_1
      - address_name
      - address_postal_code
      type: object
    SmsMessageCollection:
      description: Array of SmsMessage items
      discriminator:
        propertyName: classType
      example:
        messages:
        - from: from
          body: body
          to: "69505609"
          source: sdk
          schedule: 0
          custom_string: custom_string
          list_id: 0
          country: country
          from_email: from_email
        - from: from
          body: body
          to: "69505609"
          source: sdk
          schedule: 0
          custom_string: custom_string
          list_id: 0
          country: country
          from_email: from_email
      properties:
        messages:
          description: Array of SmsMessage items
          items:
            $ref: "#/components/schemas/SmsMessage"
          type: array
      required:
      - messages
      type: object
    SmsMessage:
      description: SmsMessage model
      discriminator:
        propertyName: classType
      example:
        from: from
        body: body
        to: "69505609"
        source: sdk
        schedule: 0
        custom_string: custom_string
        list_id: 0
        country: country
        from_email: from_email
      properties:
        from:
          description: "Your sender id - more info: https://help.clicksend.com/en/collections/57584-numbers-sender-ids."
          type: string
        body:
          description: Your message.
          type: string
        to:
          description: Recipient phone number in E.164 format.
          example: "69505609"
          type: string
        source:
          default: sdk
          description: "Your method of sending e.g. 'wordpress', 'php', 'c#'."
          example: sdk
          type: string
        schedule:
          default: 0
          description: Leave blank for immediate delivery. Your schedule time in unix
            format https://help.clicksend.com/en/articles/44235-what-is-a-unix-timestamp
          example: 0
          format: int32
          type: integer
        custom_string:
          description: Your reference. Will be passed back with all replies and delivery
            reports.
          type: string
        list_id:
          description: Your list ID if sending to a whole list. Can be used instead
            of 'to'.
          format: int32
          type: integer
        country:
          description: Recipient country.
          type: string
        from_email:
          description: "An email address where the reply should be emailed to. If\
            \ omitted, the reply will be emailed back to the user who sent the outgoing\
            \ SMS."
          type: string
      required:
      - body
      type: object
    Account:
      description: Complete account details needed for the user.
      discriminator:
        propertyName: classType
      example:
        username: username
        password: password
        user_phone: user_phone
        user_email: user_email
        user_first_name: user_first_name
        user_last_name: user_last_name
        account_name: account_name
        country: country
      properties:
        username:
          description: Your username
          type: string
        password:
          description: Your password
          type: string
        user_phone:
          description: Your phone number in E.164 format.
          type: string
        user_email:
          description: Your email
          type: string
        user_first_name:
          description: Your first name
          type: string
        user_last_name:
          description: Your last name
          type: string
        account_name:
          description: Your delivery to value.
          type: string
        country:
          description: Your country
          type: string
      required:
      - account_name
      - country
      - password
      - user_email
      - user_first_name
      - user_last_name
      - user_phone
      - username
      type: object
    Contact:
      description: Contains all details for the main contact.
      discriminator:
        propertyName: classType
      example:
        phone_number: phone_number
        custom_1: custom_1
        email: email
        fax_number: fax_number
        first_name: first_name
        address_line_1: address_line_1
        address_line_2: address_line_2
        address_city: address_city
        address_state: address_state
        address_postal_code: address_postal_code
        address_country: address_country
        organization_name: organization_name
        custom_2: custom_2
        custom_3: custom_3
        custom_4: custom_4
        last_name: last_name
      properties:
        phone_number:
          description: Your phone number in E.164 format. Must be provided if no fax
            number or email.
          type: string
        custom_1:
          description: ""
          type: string
        email:
          description: Your email. Must be provided if no phone number or fax number.
          type: string
        fax_number:
          description: Your fax number. Must be provided if no phone number or email.
          type: string
        first_name:
          description: Your first name.
          type: string
        address_line_1:
          description: Your street address
          type: string
        address_line_2:
          description: ""
          type: string
        address_city:
          description: Your nearest city
          type: string
        address_state:
          description: Your current state
          type: string
        address_postal_code:
          description: Your current postcode
          type: string
        address_country:
          description: Your current country
          type: string
        organization_name:
          description: Your organisation name
          type: string
        custom_2:
          description: ""
          type: string
        custom_3:
          description: ""
          type: string
        custom_4:
          description: ""
          type: string
        last_name:
          description: Your last name
          type: string
      required:
      - custom_1
      - phone_number
      type: object
    Fields:
      description: Contains all details for the main contact.
      discriminator:
        propertyName: classType
      example:
        fields:
          phone_number: phone_number
          custom_1: custom_1
          email: email
          fax_number: fax_number
