            target="_blank">Unix format</a>.
          example: "1444821615"
          type: string
        status:
          description: |-
            The status of the SMS. Available statuses are:

              - _Approved_: The SMS campaign has been approved and is ready to be sent.
              - _Cancelled_: The SMS campaign was scheduled but has been cancelled before sending.
              - _Draft_: The SMS campaign is saved as a draft and has not been sent.
              - _Failed_: The SMS campaign failed to send due to an issue.
              - _Queued_: The SMS campaign is waiting to be sent.
              - _Scheduled_: The SMS campaign is set to be sent at a later time.
              - _Sending_: The SMS campaign is currently being sent.
              - _Sent_: The SMS campaign has been sent, but this does not guarantee that all messages were successfully delivered.
              - _WaitApproval_: The SMS campaign is awaiting approval from ClickSend, which may take a few minutes.
          example: Queued
          type: string
        date_added:
          description: The date you created the SMS campaign. It is in <a href="http://help.clicksend.com/what-is-a-unix-timestamp"
            target="_blank">Unix format</a>.
          example: "1444962630"
          type: string
        custom_string:
          description: The custom note that was added when creating or updating the
            SMS campaign.
          nullable: true
          type: string
          example: null
        url_to_shorten:
          description: The original URL that had been shorten. It will return an **empty**
            value if the SMS campaign didn’t include any shortened URL.
          type: string
        unsubscribe_link:
          description: |-
            Indicates whether an unsubscribe link has been included in the message. To provide the option to unsubscribe, you can add the literal `StopMsg.me/xxxxx` in the message body. This parameter specifies whether the link was added:

              - **0**: The unsubscribe option was not provided.
              - **1**: The unsubscribe option was provided.
          type: integer
        source:
          description: "The source of the request. For example, the name of your application.\
            \ It's used to identify messages sent from various applications. It will\
            \ return a **null** value if the source was not specified in the SMS campaign."
          nullable: true
          type: string
          example: null
        senders:
          description: The specific sender IDs for each recipient country. It will
            return a **null** value if you did not specify the sender in the SMS campaign.
          items:
            $ref: "#/components/schemas/sms_campaign_senders_inner"
          type: array
        _total_count:
          description: The total number of messages sent in the SMS campaign.
          example: 10
          type: integer
        _list_name:
          description: The name of the contact list of the SMS campaign. This is related
            of the _list_id_ parameter.
          type: string
      type: object
